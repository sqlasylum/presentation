# ══════════════════════════════════════════════════════
#  postgresql.conf — PRIMARY  (PostgreSQL 15)
#  Tuned for streaming replication demo
# ══════════════════════════════════════════════════════

# Connection
listen_addresses = '*'
port = 5432

# Replication
wal_level = replica
max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = 256MB
hot_standby = on
hot_standby_feedback = on

# Performance (demo-friendly, not production)
shared_buffers = 128MB
max_connections = 100

# Logging
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql.log'
log_truncate_on_rotation = off
log_line_prefix = '%t [%p] [%a] '
log_statement = 'ddl'
log_replication_commands = on
